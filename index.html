<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Super Chat</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* --- 1. CẤU HÌNH CƠ BẢN --- */
        :root { --primary: #0084ff; --bg: #f0f2f5; --danger: #ff3b30; --text: #333; }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: sans-serif; background: var(--bg); height: 100dvh; width: 100vw; overflow: hidden; }
        
        .app { display: flex; flex-direction: column; height: 100%; width: 100%; max-width: 600px; margin: 0 auto; background: #fff; box-shadow: 0 0 20px rgba(0,0,0,0.1); }

        /* --- 2. HEADER & TABS --- */
        .header { height: 50px; padding: 0 15px; border-bottom: 1px solid #ddd; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .header h3 { margin: 0; font-size: 16px; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        .head-btn { border: none; background: none; font-size: 18px; cursor: pointer; color: #555; padding: 5px; }
        .head-btn.active { color: var(--success-color); }

        .tabs { height: 45px; display: flex; border-bottom: 1px solid #ddd; flex-shrink: 0; background: #fafafa; }
        .tab { flex: 1; border: none; background: none; font-weight: 600; color: #888; cursor: pointer; border-bottom: 3px solid transparent; }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); background: #fff; }

        /* --- 3. KHUNG NỘI DUNG (QUAN TRỌNG) --- */
        .panels { flex: 1; position: relative; overflow: hidden; }
        
        /* Panel chung */
        .panel { display: none; height: 100%; flex-direction: column; }
        .panel.active { display: flex; }

        /* --- TAB 1: CHAT --- */
        #chatList { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #f0f2f5; }
        
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.4; word-wrap: break-word; }
        .user { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: white; border: 1px solid #ddd; color: black; border-bottom-left-radius: 4px; }
        .sys { align-self: center; font-size: 12px; color: #888; margin: 5px 0; font-style: italic; }

        /* Input Area */
        .input-box { padding: 10px; border-top: 1px solid #ddd; background: #fff; flex-shrink: 0; }
        .normal-input { display: flex; gap: 10px; }
        .chat-input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        .icon-btn { width: 45px; height: 45px; border-radius: 50%; border: none; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .send-btn { background: var(--primary); color: white; }
        .mic-btn { background: #eee; color: #333; }
        .mic-btn.listening { background: var(--danger); color: white; animation: pulse 1s infinite; }

        /* Walkie Talkie */
        .wt-input { display: none; flex-direction: column; align-items: center; padding: 10px; }
        .wt-btn { width: 80px; height: 80px; border-radius: 50%; background: var(--primary); color: white; font-size: 30px; border: none; cursor: pointer; }
        .wt-btn:active { transform: scale(0.95); }
        
        /* --- TAB 2: SETTINGS --- */
        #settingsPanel { padding: 20px; overflow-y: auto; background: #fff; }
        .group { margin-bottom: 20px; border: 1px solid #eee; padding: 15px; border-radius: 8px; }
        .label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        select, input[type=number] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; margin-bottom: 10px; }
        .switch-row { display: flex; justify-content: space-between; align-items: center; }

        /* --- TAB 3: MEMORY --- */
        #memoryPanel { padding: 0; background: #1e1e1e; }
        .mem-header { padding: 10px; background: #333; color: #fff; font-size: 12px; font-weight: bold; border-bottom: 1px solid #444; flex-shrink: 0; }
        .mem-content { flex: 1; padding: 15px; overflow-y: auto; font-family: monospace; color: #0f0; font-size: 13px; line-height: 1.5; white-space: pre-wrap; }

        /* Utilities */
        .typing { display: none; padding: 10px; background: white; border-radius: 15px; width: fit-content; margin-bottom: 10px; border: 1px solid #ddd; }
        .dot { display: inline-block; width: 6px; height: 6px; background: #888; border-radius: 50%; margin: 0 2px; animation: bounce 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; } .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,0,0,0.4); } 70% { box-shadow: 0 0 0 10px rgba(255,0,0,0); } 100% { box-shadow: 0 0 0 0 rgba(255,0,0,0); } }
        
        /* Reasoning Box */
        .think-box { margin-bottom: 5px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
        .think-head { background: #f0f0f0; padding: 5px 10px; font-size: 11px; font-weight: bold; cursor: pointer; color: #555; }
        .think-body { padding: 10px; font-size: 13px; color: #444; display: none; background: #fff; border-top: 1px solid #ddd; }
        .think-box.open .think-body { display: block; }
    </style>
</head>
<body>

<div class="app">
    <!-- 1. HEADER -->
    <div class="header">
        <h3><i class="fas fa-robot"></i> Super AI</h3>
        <div>
            <button class="head-btn" id="voiceToggle" onclick="toggleVoiceMode()" title="Chế độ Bộ đàm"><i class="fas fa-walkie-talkie"></i></button>
            <button class="head-btn" onclick="resetApp()" title="Reset"><i class="fas fa-trash-alt"></i></button>
        </div>
    </div>

    <!-- 2. TABS -->
    <div class="tabs">
        <button class="tab active" onclick="showTab('chat')">Chat</button>
        <button class="tab" onclick="showTab('settings')">Cài đặt</button>
        <button class="tab" onclick="showTab('memory')">Bộ não</button>
    </div>

    <!-- 3. MAIN CONTENT -->
    <div class="panels">
        
        <!-- PANEL CHAT -->
        <div id="chatPanel" class="panel active">
            <div id="chatList">
                <div class="typing" id="loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
            </div>
            
            <div class="input-box">
                <!-- Chế độ thường -->
                <div class="normal-input" id="normalMode">
                    <input type="text" id="userInput" class="chat-input" placeholder="Nhập tin nhắn..." autocomplete="off">
                    <button class="icon-btn mic-btn" id="micBtn" onclick="toggleMic()"><i class="fas fa-microphone"></i></button>
                    <button class="icon-btn send-btn" id="sendBtn" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
                </div>
                <!-- Chế độ bộ đàm -->
                <div class="wt-input" id="wtMode">
                    <div style="font-size:12px; color:#666; margin-bottom:5px;" id="wtStatus">Nhấn giữ để nói...</div>
                    <button class="wt-btn" id="bigMic" onmousedown="startHold()" onmouseup="endHold()" ontouchstart="startHold()" ontouchend="endHold()"><i class="fas fa-microphone"></i></button>
                </div>
            </div>
        </div>

        <!-- PANEL SETTINGS -->
        <div id="settingsPanel" class="panel">
            <div class="group">
                <div class="switch-row">
                    <span class="label">🔄 Auto Switch Model</span>
                    <input type="checkbox" id="autoSwitch" checked>
                </div>
                <small style="color:#666;">Tự động đổi model nếu bị quá tải.</small>
            </div>

            <div class="group">
                <span class="label">🤖 Chọn Model AI:</span>
                <select id="modelSelect">
                    <option value="llama-3.1-8b-instant" selected>Llama 3.1 8B (Nhanh)</option>
                    <option value="llama-3.3-70b-versatile">Llama 3.3 70B (Thông minh)</option>
                    <option value="qwen/qwen3-32b">Qwen 3 32B (Reasoning)</option>
                    <option value="moonshotai/kimi-k2-instruct-0905">Moonshot Kimi</option>
                    <option value="meta-llama/llama-4-scout-17b-16e-instruct">Llama 4 Scout</option>
                    <option value="openai/gpt-oss-120b">GPT-OSS 120B</option>
                </select>
            </div>

            <div class="group">
                <span class="label">📜 Lịch sử ngắn (Tin nhắn):</span>
                <input type="number" id="histLimit" value="10" min="2" max="50">
                <span class="label">🧠 Giới hạn Bộ nhớ (Ký tự):</span>
                <input type="number" id="memLimit" value="2000" min="500" step="100">
            </div>
        </div>

        <!-- PANEL MEMORY -->
        <div id="memoryPanel" class="panel">
            <div class="mem-header">REAL-TIME MEMORY LOG</div>
            <div id="memContent" class="mem-content">Chưa có dữ liệu...</div>
        </div>

    </div>
</div>

<script>
    const API_URL = "/api/chat";
    
    // UI Refs
    const chatList = document.getElementById('chatList');
    const loading = document.getElementById('loading');
    const userInput = document.getElementById('userInput');
    const memContent = document.getElementById('memContent');
    
    // Inputs
    const modelSelect = document.getElementById('modelSelect');
    const autoSwitch = document.getElementById('autoSwitch');
    const histLimit = document.getElementById('histLimit');
    const memLimit = document.getElementById('memLimit');

    // State
    let history = [];
    let currentSummary = "";
    let isWTMode = false;

    // --- 1. INITIALIZATION ---
    window.onload = () => {
        try {
            const h = localStorage.getItem('h');
            const m = localStorage.getItem('m');
            if(h) {
                history = JSON.parse(h);
                history.forEach(msg => appendUI(msg.role, msg.content, false));
            } else {
                appendUI('ai', 'Xin chào! Tôi có thể giúp gì?', false);
            }
            if(m) {
                currentSummary = m;
                memContent.innerText = m;
            }
        } catch(e) { console.log(e); }
        scrollToBottom();
    };

    function saveState() {
        localStorage.setItem('h', JSON.stringify(history));
        localStorage.setItem('m', currentSummary);
    }

    // --- 2. TAB SYSTEM ---
    window.showTab = (name) => {
        document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        
        if(name === 'chat') {
            document.getElementById('chatPanel').classList.add('active');
            document.querySelectorAll('.tab')[0].classList.add('active');
        } else if(name === 'settings') {
            document.getElementById('settingsPanel').classList.add('active');
            document.querySelectorAll('.tab')[1].classList.add('active');
        } else {
            document.getElementById('memoryPanel').classList.add('active');
            document.querySelectorAll('.tab')[2].classList.add('active');
        }
    }

    // --- 3. CHAT LOGIC ---
    async function sendMsg() {
        const text = userInput.value.trim();
        if(!text) return;

        // UI Update
        appendUI('user', text);
        userInput.value = '';
        if(!isWTMode) userInput.blur();
        
        loading.style.display = 'block';
        chatList.appendChild(loading); // Move loading to bottom
        scrollToBottom();

        // Send
        await sendRequest(text, modelSelect.value);
    }

    async function sendRequest(text, model) {
        try {
            const res = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: text,
                    history: history,
                    currentSummary: currentSummary,
                    model: model,
                    maxMemoryLength: parseInt(memLimit.value) || 2000,
                    historyLimit: parseInt(histLimit.value) || 10
                })
            });

            const data = await res.json();
            if(data.error) throw new Error(data.error);

            loading.style.display = 'none';
            appendUI('ai', data.response);

            // Update State
            if(data.newSummary) {
                currentSummary = data.newSummary;
                memContent.innerText = currentSummary;
            }
            history.push({role:'user', content: text});
            history.push({role:'assistant', content: data.response});
            saveState();

        } catch (err) {
            // Auto Switch Logic
            const isOverloaded = err.message.includes('429') || err.message.includes('capacity');
            if(isOverloaded && autoSwitch.checked) {
                const next = getNextModel(model);
                if(next) {
                    appendSystem(`⚠️ ${model} quá tải. Chuyển sang ${next}...`);
                    modelSelect.value = next;
                    await sendRequest(text, next);
                    return;
                }
            }
            loading.style.display = 'none';
            appendSystem(`❌ Lỗi: ${err.message}`);
        }
    }

    // --- 4. UI HELPERS ---
    function appendUI(role, text, animate=true) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        
        // Qwen Thinking Check
        if(role === 'ai' && text.includes('<think>')) {
            const parts = text.split('</think>');
            if(parts.length > 1) {
                const think = parts[0].replace('<think>', '').trim();
                const content = parts[1].trim();
                div.innerHTML = `
                    <div class="think-box">
                        <div class="think-head" onclick="this.parentNode.classList.toggle('open')">🤔 Suy luận (Bấm để xem)</div>
                        <div class="think-body">${think.replace(/\n/g, '<br>')}</div>
                    </div>
                    ${content.replace(/\n/g, '<br>')}
                `;
            } else { div.innerHTML = text.replace(/\n/g, '<br>'); }
        } else {
            div.innerHTML = text.replace(/\n/g, '<br>');
        }

        chatList.insertBefore(div, loading);
        if(animate) scrollToBottom();
    }

    function appendSystem(text) {
        const div = document.createElement('div');
        div.className = 'sys';
        div.innerText = text;
        chatList.insertBefore(div, loading);
        scrollToBottom();
    }

    function scrollToBottom() { chatList.scrollTop = chatList.scrollHeight; }

    function getNextModel(curr) {
        const opts = Array.from(modelSelect.options).map(o => o.value);
        const idx = opts.indexOf(curr);
        return (idx > -1 && idx < opts.length - 1) ? opts[idx+1] : opts[0];
    }

    window.resetApp = () => {
        if(!confirm('Xóa hết?')) return;
        localStorage.clear();
        location.reload();
    }

    // --- 5. VOICE & MODE ---
    userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });

    window.toggleVoiceMode = () => {
        isWTMode = !isWTMode;
        document.getElementById('voiceToggle').style.color = isWTMode ? 'red' : '#555';
        document.getElementById('normalMode').style.display = isWTMode ? 'none' : 'flex';
        document.getElementById('wtMode').style.display = isWTMode ? 'flex' : 'none';
    }

    // Web Speech API
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let rec;
    if(SpeechRecognition) {
        rec = new SpeechRecognition();
        rec.lang = 'vi-VN';
        rec.onresult = (e) => {
            const txt = e.results[0][0].transcript;
            if(isWTMode) {
                userInput.value = txt; sendMsg();
                document.getElementById('wtStatus').innerText = "Đã gửi: " + txt;
            } else {
                userInput.value = txt; userInput.focus();
            }
        };
        rec.onend = () => { 
            document.getElementById('micBtn').classList.remove('listening'); 
            document.getElementById('bigMic').style.transform = 'scale(1)';
        };
    }

    window.toggleMic = () => {
        if(!rec) return alert('Trình duyệt không hỗ trợ');
        document.getElementById('micBtn').classList.add('listening');
        rec.start();
    }

    window.startHold = () => {
        if(!rec) return;
        rec.start();
        document.getElementById('bigMic').style.transform = 'scale(1.1)';
        document.getElementById('wtStatus').innerText = "Đang nghe...";
    }
    window.endHold = () => {
        if(!rec) return;
        rec.stop();
        document.getElementById('bigMic').style.transform = 'scale(1)';
        document.getElementById('wtStatus').innerText = "Đang xử lý...";
    }

</script>

</body>
</html>
