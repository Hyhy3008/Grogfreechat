<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Super Chat Pro</title>
    <!-- Thư viện Icon -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* =========================================
           1. CẤU HÌNH GIAO DIỆN CHUNG
           ========================================= */
        :root {
            --primary-color: #0084ff;
            --bg-color: #f0f2f5;
            --danger-color: #ff3b30;
            --success-color: #28a745;
            --text-color: #333;
            --warning-bg: #fff3cd;
            --warning-text: #856404;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-color);
            height: 100dvh; /* Chiều cao thực tế trên mobile */
            width: 100vw;
            display: flex;
            justify-content: center;
            overflow: hidden; /* Chặn cuộn body */
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* =========================================
           2. HEADER (THANH TIÊU ĐỀ)
           ========================================= */
        .header {
            padding: 0 15px;
            background: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid #e5e5ea;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            flex-shrink: 0; /* Không bị co lại */
            z-index: 10;
        }

        .header-left {
            font-weight: 600;
            font-size: 18px;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Nút trên Header */
        .header-btn {
            background: #f0f2f5;
            border: none;
            cursor: pointer;
            color: #555;
            font-size: 16px;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .header-btn:hover {
            background: #e4e6eb;
            color: #000;
        }

        /* Trạng thái nút Bộ đàm khi Bật */
        .header-btn.active {
            background: var(--success-color);
            color: white;
            box-shadow: 0 2px 8px rgba(40, 167, 69, 0.4);
        }

        /* =========================================
           3. TABS (CHUYỂN ĐỔI CHAT / CÀI ĐẶT)
           ========================================= */
        .tabs {
            display: flex;
            background: white;
            border-bottom: 1px solid #e5e5ea;
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            font-weight: 600;
            color: #888;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: 0.3s;
        }

        .tab-btn.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        /* =========================================
           4. CONTENT AREA (KHUNG CHÍNH)
           ========================================= */
        .content-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Panel Chat */
        #chatPanel {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Panel Memory/Settings */
        #memoryPanel {
            height: 100%;
            padding: 20px;
            overflow-y: auto; /* Cho phép cuộn */
            background: #fff;
            display: none; /* Mặc định ẩn */
            -webkit-overflow-scrolling: touch; /* Cuộn mượt trên iOS */
        }

        /* =========================================
           5. CHAT LIST (DANH SÁCH TIN NHẮN)
           ========================================= */
        .chat-list {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        /* Bong bóng tin nhắn */
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            position: relative;
        }

        .user {
            align-self: flex-end;
            background: var(--primary-color);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .ai {
            align-self: flex-start;
            background: white;
            border: 1px solid #e5e5ea;
            color: black;
            border-bottom-left-radius: 4px;
        }

        /* Tin nhắn hệ thống (Thông báo nhỏ) */
        .system {
            align-self: center;
            font-size: 12px;
            color: #666;
            background: rgba(0,0,0,0.05);
            padding: 5px 12px;
            border-radius: 12px;
            margin: 5px 0;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.1);
        }

        /* Hiệu ứng Thinking (Cho Qwen) */
        .reasoning-box {
            margin-bottom: 8px;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            background: #fafafa;
        }

        .reasoning-header {
            background: #f0f0f0;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 600;
            color: #555;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            user-select: none;
        }
        
        .reasoning-header:hover { background: #e5e5e5; }

        .reasoning-content {
            padding: 10px 12px;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            color: #444;
            border-top: 1px solid #ddd;
            background: white;
            white-space: pre-wrap;
            display: none; /* Mặc định đóng */
        }

        /* Class để mở rộng Thinking */
        .reasoning-box.open .reasoning-content { display: block; }
        .arrow { transition: transform 0.2s; display: inline-block; font-size: 10px; }
        .reasoning-box.open .arrow { transform: rotate(180deg); }

        /* Loading Dots */
        .typing {
            display: none;
            align-self: flex-start;
            background: white;
            padding: 10px 15px;
            border-radius: 18px;
            margin-bottom: 10px;
            width: fit-content;
            border: 1px solid #e5e5ea;
        }
        .dot { width: 6px; height: 6px; background: #888; border-radius: 50%; display: inline-block; animation: bounce 1.4s infinite; margin: 0 2px; }
        .dot:nth-child(2) { animation-delay: 0.2s; } .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

        /* =========================================
           6. INPUT AREA (NHẬP LIỆU & VOICE)
           ========================================= */
        .input-wrapper {
            background: white;
            border-top: 1px solid #c6c6c8;
            padding-bottom: env(safe-area-inset-bottom, 15px); /* Fix cho iPhone */
            flex-shrink: 0;
        }

        /* Chế độ Thường (Normal) */
        .normal-mode {
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input.chat-input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 20px;
            border: 1px solid #c6c6c8;
            font-size: 16px;
            outline: none;
            background: #f9f9f9;
            transition: border 0.2s;
        }
        input.chat-input:focus {
            border-color: var(--primary-color);
            background: white;
        }

        /* Nút bấm tròn (Gửi / Mic nhỏ) */
        .action-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        #sendBtn { background: var(--primary-color); color: white; }
        #sendBtn:active { transform: scale(0.95); }
        
        #micBtn { background: #e4e6eb; color: #333; }
        #micBtn.active { background: var(--danger-color); color: white; animation: pulse 1.5s infinite; }

        /* Chế độ Bộ đàm (Walkie Talkie) */
        .walkie-talkie-mode {
            display: none; /* Mặc định ẩn */
            justify-content: center;
            align-items: center;
            padding: 20px;
            flex-direction: column;
            gap: 15px;
            background: #f8f9fa;
            border-top: 1px solid #ddd;
        }

        .big-mic-btn {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: none;
            background: var(--primary-color);
            color: white;
            font-size: 32px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 132, 255, 0.3);
            transition: transform 0.1s, background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .big-mic-btn:active { transform: scale(0.95); background: var(--danger-color); }
        
        /* Hiệu ứng khi đang giữ nút */
        .big-mic-btn.recording {
            background: var(--danger-color);
            animation: pulse 1.5s infinite;
            transform: scale(1.1);
        }

        .wt-status {
            font-size: 15px;
            color: #555;
            font-weight: 500;
            min-height: 20px;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 59, 48, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
        }

        /* =========================================
           7. SETTINGS UI (TAB CÀI ĐẶT)
           ========================================= */
        .settings-box {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .setting-row { margin-bottom: 20px; }
        
        .setting-label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            color: #444;
            margin-bottom: 8px;
        }

        select.full-width {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: white;
            font-size: 15px;
            outline: none;
        }

        /* Toggle Switch Custom */
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--success-color); }
        input:checked + .slider:before { transform: translateX(16px); }

        /* Memory Limit Input */
        .limit-input-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .limit-input-group input {
            width: 120px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            text-align: center;
            font-size: 15px;
        }

        /* Memory Display Box */
        .memory-display {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            padding: 15px;
            border-radius: 12px;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            color: #333;
            min-height: 150px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <i class="fas fa-brain" style="color: #0084ff; font-size: 24px;"></i>
            <span>Super AI</span>
        </div>
        <div class="header-right">
            <!-- Nút chuyển chế độ Bộ đàm (Trên Header) -->
            <button id="wtToggleBtn" class="header-btn" onclick="toggleVoiceMode()" title="Bật/Tắt chế độ Bộ đàm">
                <i class="fas fa-walkie-talkie"></i>
            </button>
            
            <!-- Nút Reset -->
            <button class="header-btn" onclick="resetChat()" title="Xóa bộ nhớ">
                <i class="fas fa-trash-alt"></i>
            </button>
        </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('chat')" id="tabChat">💬 Trò chuyện</button>
        <button class="tab-btn" onclick="switchTab('memory')" id="tabMem">⚙️ Cài đặt</button>
    </div>

    <div class="content-area">
        <!-- === TAB 1: GIAO DIỆN CHAT === -->
        <div id="chatPanel">
            <div class="chat-list" id="chatBox">
                <div class="message ai">Xin chào! Tôi có thể giúp gì cho bạn hôm nay?</div>
                <div class="typing" id="loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
            </div>
            
            <div class="input-wrapper">
                <!-- Chế độ Thường -->
                <div class="normal-mode" id="normalInput">
                    <input type="text" id="userInput" class="chat-input" placeholder="Nhập tin nhắn..." autocomplete="off">
                    <button id="micBtn" class="action-btn" onclick="toggleNormalVoice()"><i class="fas fa-microphone"></i></button>
                    <button id="sendBtn" class="action-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                </div>

                <!-- Chế độ Bộ đàm (Walkie Talkie) -->
                <div class="walkie-talkie-mode" id="wtInput">
                    <div class="wt-status" id="wtStatus">Nhấn giữ nút để nói...</div>
                    <button id="bigMicBtn" class="big-mic-btn" 
                        onmousedown="startHold()" onmouseup="endHold()" 
                        ontouchstart="startHold()" ontouchend="endHold()">
                        <i class="fas fa-microphone"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- === TAB 2: CÀI ĐẶT & BỘ NHỚ === -->
        <div id="memoryPanel">
            <div class="settings-box">
                <!-- Toggle Auto Switch -->
                <div class="toggle-row">
                    <div style="display:flex; flex-direction:column;">
                        <label class="setting-label" style="margin:0; color:#000;">🔄 Tự động đổi Model:</label>
                        <small style="color:#666; font-size:12px;">Tự chuyển model khác khi bị lỗi Quá tải (Rate Limit).</small>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="autoSwitchToggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                
                <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">

                <!-- Model Select -->
                <div class="setting-row">
                    <label class="setting-label">🤖 Chọn Mô Hình AI (Ưu tiên):</label>
                    <select id="modelSelect" class="full-width">
                        <option value="llama-3.1-8b-instant" selected>Llama 3.1 8B (Nhanh nhất - Ổn định)</option>
                        <option value="llama-3.3-70b-versatile">Llama 3.3 70B (Thông minh nhất)</option>
                        <option value="qwen/qwen3-32b">Qwen 3 32B (Có suy luận/Thinking)</option>
                        <option value="moonshotai/kimi-k2-instruct-0905">Moonshot Kimi k2 (0905)</option>
                        <option value="openai/gpt-oss-120b">GPT-OSS 120B</option>
                        <option value="openai/gpt-oss-20b">GPT-OSS 20B</option>
                        <option value="openai/gpt-oss-safeguard-20b">GPT-OSS Safeguard 20B</option>
                        <option value="meta-llama/llama-4-scout-17b-16e-instruct">Llama 4 Scout 17B (Thử nghiệm)</option>
                    </select>
                </div>

                <!-- Memory Limit -->
                <div class="setting-row">
                    <label class="setting-label">🧠 Giới hạn Bộ nhớ (Ký tự):</label>
                    <div class="limit-input-group">
                        <input type="number" id="memLimitInput" value="2000" min="500" step="100">
                        <span style="font-size:14px; color:#555;">ký tự</span>
                    </div>
                </div>
            </div>

            <h3 style="margin-top:0; color:#333; font-size:14px; margin-bottom:10px;">
                Nội dung bộ nhớ (Real-time): 
                <span id="currLen" style="float:right; font-weight:normal; color:#888; font-size:12px;">0 chars</span>
            </h3>
            <div id="memoryDisplay" class="memory-display">
                <div style="color:#999; font-style:italic;">Chưa có dữ liệu...</div>
            </div>
        </div>
    </div>
</div>

<!-- =========================================
     JAVASCRIPT LOGIC
     ========================================= -->
<script>
    // --- KHAI BÁO BIẾN ---
    const API_URL = "/api/chat";
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const micBtn = document.getElementById('micBtn');
    const loading = document.getElementById('loading');
    
    // Tab Settings
    const memoryDisplay = document.getElementById('memoryDisplay');
    const currLen = document.getElementById('currLen');
    const memLimitInput = document.getElementById('memLimitInput');
    const modelSelect = document.getElementById('modelSelect');
    const autoSwitchToggle = document.getElementById('autoSwitchToggle');
    
    // Voice & Mode
    const normalInput = document.getElementById('normalInput');
    const wtInput = document.getElementById('wtInput');
    const bigMicBtn = document.getElementById('bigMicBtn');
    const wtStatus = document.getElementById('wtStatus');
    const wtToggleBtn = document.getElementById('wtToggleBtn');
    
    let history = []; 
    let currentSummary = ""; 
    let isWTMode = false; // Trạng thái Bộ đàm

    // --- SETUP VOICE (WEB SPEECH API) ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'vi-VN'; 
        recognition.continuous = false; 
        recognition.interimResults = false;

        recognition.onresult = function(event) {
            const text = event.results[0][0].transcript;
            
            if (isWTMode) {
                // Chế độ Bộ đàm: Gửi luôn
                userInput.value = text;
                sendMessage();
                wtStatus.innerText = "Đã gửi: " + text;
                setTimeout(() => wtStatus.innerText = "Nhấn giữ để nói...", 2000);
            } else {
                // Chế độ Thường: Điền vào ô input
                userInput.value = text;
                userInput.focus();
            }
        };

        recognition.onerror = function(event) {
            console.error("Lỗi Voice:", event.error);
            if(isWTMode) wtStatus.innerText = "Lỗi nhận diện. Thử lại.";
            else alert("Không nhận diện được giọng nói.");
        };
    } else {
        alert("Trình duyệt không hỗ trợ Voice Chat.");
    }

    // --- CÁC HÀM ĐIỀU KHIỂN ---

    // 1. Chuyển đổi chế độ Bộ đàm (Trên Header)
    function toggleVoiceMode() {
        isWTMode = !isWTMode;
        if (isWTMode) {
            normalInput.style.display = 'none';
            wtInput.style.display = 'flex';
            wtToggleBtn.classList.add('active'); // Đổi màu nút
        } else {
            normalInput.style.display = 'flex';
            wtInput.style.display = 'none';
            wtToggleBtn.classList.remove('active');
        }
    }

    // 2. Xử lý nút Voice Thường (Toggle)
    function toggleNormalVoice() {
        if (!recognition) return;
        if (micBtn.classList.contains('active')) {
            recognition.stop();
            micBtn.classList.remove('active');
        } else {
            recognition.start();
            micBtn.classList.add('active');
        }
    }

    // 3. Xử lý nút Bộ đàm (Hold-to-Talk)
    function startHold() {
        if (!recognition) return;
        recognition.start();
        bigMicBtn.classList.add('recording');
        wtStatus.innerText = "Đang nghe...";
    }

    function endHold() {
        if (!recognition) return;
        recognition.stop();
        bigMicBtn.classList.remove('recording');
        wtStatus.innerText = "Đang xử lý...";
    }

    // 4. Chuyển Tab
    function switchTab(tabName) {
        if (tabName === 'chat') {
            document.getElementById('chatPanel').style.display = 'flex';
            document.getElementById('memoryPanel').style.display = 'none';
            document.getElementById('tabChat').classList.add('active');
            document.getElementById('tabMem').classList.remove('active');
        } else {
            document.getElementById('chatPanel').style.display = 'none';
            document.getElementById('memoryPanel').style.display = 'block';
            document.getElementById('tabChat').classList.remove('active');
            document.getElementById('tabMem').classList.add('active');
        }
    }

    // 5. Cập nhật giao diện bộ nhớ
    function updateMemoryUI(text) {
        const len = text ? text.length : 0;
        currLen.innerText = len + " chars";
        
        // Đổi màu cảnh báo
        const limit = parseInt(memLimitInput.value) || 2000;
        if (len > limit) currLen.style.color = "red";
        else if (len > limit * 0.8) currLen.style.color = "orange";
        else currLen.style.color = "var(--success-color)";

        if (!text) {
            memoryDisplay.innerHTML = '<div style="color:#999; font-style:italic;">Chưa có dữ liệu...</div>';
        } else {
            memoryDisplay.innerText = text;
        }
    }

    // 6. Reset Chat
    function resetChat() {
        if (!confirm("Bạn có chắc muốn xóa toàn bộ cuộc trò chuyện và bộ nhớ?")) return;
        history = []; currentSummary = ""; updateMemoryUI("");
        
        // Xóa tin nhắn cũ
        chatBox.querySelectorAll('.message, .system').forEach(m => m.remove());
        
        // Thêm thông báo
        appendSystemMessage("Đã xóa bộ nhớ. Bắt đầu mới.");
        switchTab('chat');
    }

    // 7. Gửi tin nhắn (Logic chính)
    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        userInput.value = '';
        if(!isWTMode) { userInput.blur(); toggleInput(false); }
        
        loading.style.display = 'block';
        scrollToBottom();

        const selectedModel = modelSelect.value;
        const autoSwitch = autoSwitchToggle.checked;
        
        // Gọi hàm gửi đệ quy (có thử lại)
        await sendRequestWithFallback(text, selectedModel, autoSwitch);
        
        if(!isWTMode) toggleInput(true);
    }

    // 8. Hàm gửi Request + Auto Switch Model
    async function sendRequestWithFallback(text, currentModel, autoSwitch) {
        try {
            const limit = parseInt(memLimitInput.value) || 2000;
            
            const res = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: text,
                    history: history,
                    currentSummary: currentSummary,
                    maxMemoryLength: limit,
                    model: currentModel
                })
            });

            const data = await res.json();
            if (data.error) throw new Error(data.error);

            // THÀNH CÔNG
            loading.style.display = 'none';
            const aiText = data.response || "Lỗi phản hồi.";
            
            // Render tin nhắn (Có hỗ trợ Reasoning của Qwen)
            appendMessage(aiText, 'ai', true);

            if (data.newSummary) {
                currentSummary = data.newSummary;
                updateMemoryUI(currentSummary);
            }

            history.push({ role: "user", content: text });
            history.push({ role: "assistant", content: aiText });

        } catch (error) {
            // XỬ LÝ LỖI
            console.warn(`Model ${currentModel} thất bại:`, error.message);

            const isOverloaded = error.message.includes("429") || 
                                 error.message.includes("over capacity") || 
                                 error.message.includes("Rate limit") ||
                                 error.message.includes("quota");

            if (isOverloaded && autoSwitch) {
                // Tìm model tiếp theo
                const nextModel = getNextModel(currentModel);
                
                if (nextModel) {
                    appendSystemMessage(`⚠️ ${currentModel} quá tải. Đang chuyển sang ${nextModel}...`);
                    
                    // Cập nhật Dropdown để các tin nhắn sau dùng luôn model mới
                    modelSelect.value = nextModel; 

                    // Gọi đệ quy thử lại
                    await sendRequestWithFallback(text, nextModel, true);
                    return; 
                } else {
                    loading.style.display = 'none';
                    appendSystemMessage("❌ Tất cả server đều bận. Vui lòng thử lại sau.");
                }
            } else {
                // Lỗi khác -> Hiện thông báo
                loading.style.display = 'none';
                appendSystemMessage("❌ Lỗi: " + error.message);
            }
        }
    }

    // Hàm lấy model kế tiếp
    function getNextModel(currentModel) {
        const options = Array.from(modelSelect.options).map(opt => opt.value);
        const idx = options.indexOf(currentModel);
        if (idx !== -1 && idx < options.length - 1) {
            return options[idx + 1];
        }
        return options[0]; // Quay vòng về đầu (hoặc null nếu muốn dừng)
    }

    // Hàm render tin nhắn (Hỗ trợ Qwen Thinking)
    function appendMessage(text, sender, parseThink = false) {
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        
        if (sender === 'ai' && parseThink) {
            // Tách phần <think> (nếu có)
            const thinkMatch = text.match(/<think>([\s\S]*?)<\/think>/i);
            
            if (thinkMatch) {
                const thought = thinkMatch[1].trim();
                const content = text.replace(/<think>[\s\S]*?<\/think>/i, "").trim();
                
                div.innerHTML = `
                    <div class="reasoning-box">
                        <div class="reasoning-header" onclick="this.parentElement.classList.toggle('open')">
                            <span class="arrow">▼</span> <span>Quá trình suy luận</span>
                        </div>
                        <div class="reasoning-content">${thought.replace(/\n/g, "<br>")}</div>
                    </div>
                    <div>${content.replace(/\n/g, "<br>")}</div>
                `;
            } else {
                div.innerHTML = text.replace(/\n/g, "<br>");
            }
        } else {
            div.innerHTML = text.replace(/\n/g, "<br>");
        }
        
        chatBox.insertBefore(div, loading);
        scrollToBottom();
    }

    // Hàm thêm tin nhắn hệ thống (Nhỏ, xám)
    function appendSystemMessage(text) {
        const div = document.createElement('div');
        div.className = `system`;
        div.innerText = text;
        chatBox.insertBefore(div, loading);
        scrollToBottom();
    }

    function toggleInput(enabled) {
        userInput.disabled = !enabled;
        sendBtn.disabled = !enabled;
        micBtn.disabled = !enabled;
    }

    function scrollToBottom() {
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Sự kiện Enter
    userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
</script>
