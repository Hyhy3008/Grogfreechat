<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Chatbot Pro + Voice</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* --- CẤU HÌNH GIAO DIỆN --- */
        :root { --primary-color: #0084ff; --bg-color: #f0f2f5; --danger-color: #ff3b30; --success-color: #28a745; }
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            height: 100dvh; width: 100vw; 
            display: flex; justify-content: center; 
            overflow: hidden; 
        }
        
        .app-container { 
            width: 100%; max-width: 600px; height: 100%; 
            background: white; display: flex; flex-direction: column; 
            position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); 
        }
        
        /* HEADER */
        .header { 
            padding: 0 15px; background: rgba(255,255,255,0.95); border-bottom: 1px solid #e5e5ea; 
            display: flex; align-items: center; justify-content: space-between; 
            height: 50px; z-index: 10; 
        }
        .header-title { font-weight: 600; font-size: 16px; color: #333; display: flex; align-items: center; gap: 8px; }
        .reset-btn { background: none; border: none; cursor: pointer; color: var(--danger-color); font-size: 16px; padding: 8px; }

        /* TABS */
        .tabs { display: flex; background: white; border-bottom: 1px solid #e5e5ea; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; font-weight: 600; color: #888; cursor: pointer; border-bottom: 2px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: var(--primary-color); border-bottom-color: var(--primary-color); }

        /* PANELS */
        .content-area { flex: 1; position: relative; overflow: hidden; }
        #chatPanel { height: 100%; display: flex; flex-direction: column; }
        #memoryPanel { height: 100%; padding: 20px; overflow-y: auto; background: #fff; display: none; }

        /* MEMORY CONTROLS */
        .mem-controls { background: #f8f9fa; border: 1px solid #e9ecef; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .mem-stat { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; color: #555; }
        .mem-input-group { display: flex; align-items: center; gap: 10px; }
        .mem-input-group input { width: 80px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; text-align: center; }
        
        .memory-content {
            background: #f8f9fa; border: 1px solid #e9ecef;
            padding: 15px; border-radius: 8px;
            font-family: monospace; font-size: 13px; line-height: 1.6;
            white-space: pre-wrap; color: #333;
        }

        /* CHAT UI */
        .chat-list { flex: 1; padding: 15px; overflow-y: auto; background: var(--bg-color); display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .message { max-width: 80%; padding: 10px 16px; border-radius: 18px; font-size: 16px; line-height: 1.5; word-wrap: break-word; }
        .user { align-self: flex-end; background: var(--primary-color); color: white; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: white; border: 1px solid #e5e5ea; color: black; border-bottom-left-radius: 4px; }
        
        .typing { display: none; align-self: flex-start; background: white; padding: 10px 15px; border-radius: 18px; margin-bottom: 10px; width: fit-content; }
        .dot { width: 6px; height: 6px; background: #888; border-radius: 50%; display: inline-block; animation: bounce 1.4s infinite; margin: 0 2px; }
        .dot:nth-child(2) { animation-delay: 0.2s; } .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

        /* INPUT AREA & VOICE BUTTON */
        .input-area { padding: 10px 15px; background: white; border-top: 1px solid #c6c6c8; display: flex; align-items: center; gap: 10px; padding-bottom: env(safe-area-inset-bottom, 15px); }
        input { flex: 1; padding: 12px 15px; border-radius: 20px; border: 1px solid #c6c6c8; font-size: 16px; outline: none; background: #f9f9f9; }
        input:focus { border-color: var(--primary-color); background: white; }
        
        /* Nút gửi & Nút Mic chung Style */
        .action-btn { width: 40px; height: 40px; border-radius: 50%; border: none; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        
        #sendBtn { background: var(--primary-color); color: white; }
        #sendBtn:disabled { background: #ccc; }
        
        /* Style riêng cho Mic */
        #micBtn { background: #e4e6eb; color: #333; }
        #micBtn.listening { background: var(--danger-color); color: white; animation: pulse 1.5s infinite; }
        
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(255, 59, 48, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="header-title"><i class="fas fa-brain" style="color: #0084ff;"></i> Super AI</div>
        <button class="reset-btn" onclick="resetChat()"><i class="fas fa-trash-alt"></i></button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('chat')" id="tabChat">💬 Chat</button>
        <button class="tab-btn" onclick="switchTab('memory')" id="tabMem">🧠 Bộ Nhớ</button>
    </div>

    <div class="content-area">
        <!-- TAB CHAT -->
        <div id="chatPanel">
            <div class="chat-list" id="chatBox">
                <div class="message ai">Xin chào!</div>
                <div class="typing" id="loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
            </div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Nhập tin nhắn..." autocomplete="off">
                <!-- Nút Mic Mới -->
                <button id="micBtn" class="action-btn" onclick="toggleVoice()"><i class="fas fa-microphone"></i></button>
                <!-- Nút Gửi -->
                <button id="sendBtn" class="action-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

        <!-- TAB MEMORY -->
        <div id="memoryPanel">
            <div class="mem-controls">
                <div class="mem-stat">
                    <span>Độ dài: <b id="currLen" style="color:var(--success-color)">0</b></span>
                </div>
                <div class="mem-input-group">
                    <label>Giới hạn:</label>
                    <input type="number" id="memLimitInput" value="2000" min="500" step="100">
                </div>
            </div>
            <div id="memoryDisplay" class="memory-content">
                <div style="color:#999; font-style:italic;">Chưa có dữ liệu...</div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = "/api/chat";
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const micBtn = document.getElementById('micBtn');
    const loading = document.getElementById('loading');
    const memoryDisplay = document.getElementById('memoryDisplay');
    const currLen = document.getElementById('currLen');
    const memLimitInput = document.getElementById('memLimitInput');
    
    let history = []; 
    let currentSummary = ""; 

    // --- XỬ LÝ VOICE (WEB SPEECH API) ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    let isListening = false;

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'vi-VN'; // Ngôn ngữ Tiếng Việt
        recognition.continuous = false; // Tự dừng khi nói xong câu
        recognition.interimResults = false;

        recognition.onstart = function() {
            isListening = true;
            micBtn.classList.add('listening');
            userInput.placeholder = "Đang nghe...";
        };

        recognition.onend = function() {
            isListening = false;
            micBtn.classList.remove('listening');
            userInput.placeholder = "Nhập tin nhắn...";
        };

        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript;
            userInput.value = transcript;
            userInput.focus(); // Focus để User có thể sửa nếu nhận diện sai
        };
        
        recognition.onerror = function(event) {
            console.error("Lỗi Voice:", event.error);
            isListening = false;
            micBtn.classList.remove('listening');
            alert("Không nhận diện được giọng nói. Vui lòng thử lại.");
        };
    } else {
        micBtn.style.display = 'none'; // Ẩn nút nếu trình duyệt không hỗ trợ
        console.log("Trình duyệt không hỗ trợ Web Speech API");
    }

    function toggleVoice() {
        if (!recognition) {
            alert("Trình duyệt của bạn không hỗ trợ tính năng này.");
            return;
        }
        if (isListening) {
            recognition.stop();
        } else {
            recognition.start();
        }
    }

    // --- CÁC HÀM CŨ (GIỮ NGUYÊN LOGIC) ---
    userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });

    function switchTab(tabName) {
        if (tabName === 'chat') {
            document.getElementById('chatPanel').style.display = 'flex';
            document.getElementById('memoryPanel').style.display = 'none';
            document.getElementById('tabChat').classList.add('active');
            document.getElementById('tabMem').classList.remove('active');
        } else {
            document.getElementById('chatPanel').style.display = 'none';
            document.getElementById('memoryPanel').style.display = 'block';
            document.getElementById('tabChat').classList.remove('active');
            document.getElementById('tabMem').classList.add('active');
        }
    }

    function updateMemoryUI(text) {
        const len = text ? text.length : 0;
        currLen.innerText = len;
        
        const limit = parseInt(memLimitInput.value) || 2000;
        if (len > limit) currLen.style.color = "red";
        else if (len > limit * 0.8) currLen.style.color = "orange";
        else currLen.style.color = "var(--success-color)";

        if (!text) {
            memoryDisplay.innerHTML = '<div style="color:#999; font-style:italic;">Chưa có dữ liệu...</div>';
        } else {
            memoryDisplay.innerText = text;
        }
    }

    function resetChat() {
        if (!confirm("Xóa toàn bộ cuộc trò chuyện và bộ nhớ?")) return;
        history = [];
        currentSummary = "";
        updateMemoryUI("");
        
        const msgs = chatBox.querySelectorAll('.message');
        msgs.forEach(m => m.remove());

        const sys = document.createElement('div');
        sys.className = 'message system';
        sys.innerText = "Đã reset bộ nhớ.";
        chatBox.insertBefore(sys, loading);
        
        switchTab('chat');
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        userInput.value = '';
        userInput.blur();
        toggleInput(false);
        loading.style.display = 'block';
        scrollToBottom();

        try {
            const limit = parseInt(memLimitInput.value) || 2000;

            const res = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: text,
                    history: history,
                    currentSummary: currentSummary,
                    maxMemoryLength: limit
                })
            });

            const data = await res.json();
            if (data.error) throw new Error(data.error);

            loading.style.display = 'none';
            const aiText = data.response || "Lỗi.";
            appendMessage(aiText, 'ai');

            if (data.newSummary) {
                currentSummary = data.newSummary;
                updateMemoryUI(currentSummary);
            }

            history.push({ role: "user", content: text });
            history.push({ role: "assistant", content: aiText });

        } catch (error) {
            loading.style.display = 'none';
            appendMessage("Lỗi kết nối", 'ai');
        } finally {
            toggleInput(true);
        }
    }

    function appendMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        div.innerHTML = text.replace(/\n/g, "<br>");
        chatBox.insertBefore(div, loading);
        scrollToBottom();
    }

    function toggleInput(enabled) {
        userInput.disabled = !enabled;
        sendBtn.disabled = !enabled;
        micBtn.disabled = !enabled; // Khóa luôn nút Mic khi đang gửi
    }

    function scrollToBottom() {
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
