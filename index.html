<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Chatbot Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* --- CẤU HÌNH GIAO DIỆN --- */
        :root { --primary-color: #0084ff; --bg-color: #f0f2f5; --danger-color: #ff3b30; }
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            height: 100dvh; width: 100vw; 
            display: flex; justify-content: center; 
            overflow: hidden; 
        }
        
        .app-container { 
            width: 100%; max-width: 600px; height: 100%; 
            background: white; display: flex; flex-direction: column; 
            position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.1); 
        }
        
        /* HEADER CÓ NÚT RESET */
        .header { 
            padding: 0 15px; background: rgba(255,255,255,0.95); border-bottom: 1px solid #e5e5ea; 
            display: flex; align-items: center; justify-content: space-between; /* Căn đều 2 bên */
            height: 60px; z-index: 10; 
        }
        
        .header-title { font-weight: 600; font-size: 18px; color: #333; display: flex; align-items: center; gap: 8px; }
        
        /* Nút Reset (Thùng rác) */
        .reset-btn {
            background: none; border: none; cursor: pointer; color: var(--danger-color);
            font-size: 18px; padding: 8px; border-radius: 50%;
            transition: background 0.2s;
        }
        .reset-btn:hover { background: #ffe5e5; }
        
        /* KHUNG CHAT */
        .chat-area { 
            flex: 1; padding: 15px; overflow-y: auto; 
            background: var(--bg-color); 
            display: flex; flex-direction: column; gap: 12px; 
            scroll-behavior: smooth; 
            -webkit-overflow-scrolling: touch;
        }
        
        .message { 
            max-width: 80%; padding: 10px 16px; border-radius: 18px; 
            font-size: 16px; line-height: 1.5; word-wrap: break-word; 
        }
        .user { align-self: flex-end; background: var(--primary-color); color: white; border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: white; border: 1px solid #e5e5ea; color: black; border-bottom-left-radius: 4px; }
        
        /* Thông báo hệ thống (khi reset) */
        .system-msg { align-self: center; font-size: 13px; color: #888; margin: 10px 0; font-style: italic; }

        /* LOADING */
        .typing { display: none; align-self: flex-start; background: white; padding: 10px 15px; border-radius: 18px; margin-bottom: 10px; width: fit-content; }
        .dot { width: 6px; height: 6px; background: #888; border-radius: 50%; display: inline-block; animation: bounce 1.4s infinite; margin: 0 2px; }
        .dot:nth-child(2) { animation-delay: 0.2s; } .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

        /* INPUT */
        .input-area { 
            padding: 10px 15px; background: white; border-top: 1px solid #c6c6c8; 
            display: flex; align-items: center; gap: 10px; 
            padding-bottom: env(safe-area-inset-bottom, 15px); 
        }
        input { flex: 1; padding: 12px 15px; border-radius: 20px; border: 1px solid #c6c6c8; font-size: 16px; outline: none; background: #f9f9f9; }
        input:focus { border-color: var(--primary-color); background: white; }
        button { width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--primary-color); color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="header-title">
            <i class="fas fa-robot" style="color: #0084ff;"></i> Trợ Lý AI
        </div>
        <!-- Nút Reset Chat -->
        <button class="reset-btn" onclick="resetChat()" title="Xóa bộ nhớ & Chat mới">
            <i class="fas fa-trash-alt"></i>
        </button>
    </div>

    <div class="chat-area" id="chatBox">
        <div class="message ai">Xin chào! Mình có thể giúp gì cho bạn?</div>
        <div class="typing" id="loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Nhập tin nhắn..." autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    // --- CẤU HÌNH ---
    const API_URL = "/api/chat"; 
    // ----------------

    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const loading = document.getElementById('loading');
    
    // --- BỘ NHỚ ---
    let history = []; 
    let currentSummary = ""; 

    userInput.focus();
    userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });

    // HÀM RESET CHAT (XÓA BỘ NHỚ)
    function resetChat() {
        if (!confirm("Bạn có chắc muốn xóa toàn bộ cuộc trò chuyện và bộ nhớ không?")) return;

        // 1. Xóa sạch biến bộ nhớ
        history = [];
        currentSummary = "";
        
        // 2. Làm sạch giao diện
        chatBox.innerHTML = `
            <div class="message ai">Đã xóa bộ nhớ! Chúng ta bắt đầu lại nhé.</div>
            <div class="typing" id="loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
        `;

        // Debug để bạn yên tâm
        console.log("Memory Cleared!");
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        userInput.value = '';
        userInput.blur();
        
        toggleInput(false);
        loading.style.display = 'block';
        scrollToBottom();

        try {
            const res = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: text,
                    history: history,
                    currentSummary: currentSummary // Gửi bộ nhớ hiện tại đi
                })
            });

            const data = await res.json();
            
            if (data.error) throw new Error(data.error);

            loading.style.display = 'none';
            const aiText = data.response || "Lỗi phản hồi.";
            appendMessage(aiText, 'ai');

            // Cập nhật bộ nhớ mới từ Server trả về
            if (data.newSummary) {
                currentSummary = data.newSummary;
            }

            history.push({ role: "user", content: text });
            history.push({ role: "assistant", content: aiText });

        } catch (error) {
            loading.style.display = 'none';
            appendMessage("Lỗi kết nối", 'ai');
        } finally {
            toggleInput(true);
        }
    }

    function appendMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        div.innerHTML = text.replace(/\n/g, "<br>");
        chatBox.insertBefore(div, loading);
        scrollToBottom();
    }

    function toggleInput(enabled) {
        userInput.disabled = !enabled;
        sendBtn.disabled = !enabled;
    }

    function scrollToBottom() {
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
