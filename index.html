<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super AI Memory</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .container { width: 100%; max-width: 600px; background: white; display: flex; flex-direction: column; }
        
        /* Header hiển thị bộ nhớ */
        .header { background: #222; color: #0f0; padding: 10px; font-family: monospace; font-size: 12px; border-bottom: 1px solid #444; }
        .memory-label { font-weight: bold; color: #fff; display: block; margin-bottom: 4px; }
        
        /* Chat Area */
        .chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 15px; line-height: 1.4; }
        .user { align-self: flex-end; background: #0084ff; color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #e4e6eb; color: black; border-bottom-left-radius: 2px; }
        
        /* Input */
        .input-area { padding: 15px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ccc; outline: none; }
        button { padding: 10px 20px; background: #0084ff; color: white; border: none; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <!-- Hiển thị bộ nhớ để bạn kiểm tra -->
    <div class="header">
        <span class="memory-label">MEMORY (CLOUDFLARE MANAGED):</span>
        <span id="memoryText">...</span>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message ai">Chào! Mình là Groq 70B. Mình có khả năng ghi nhớ nhờ Cloudflare.</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Nhập tin nhắn..." autocomplete="off">
        <button id="sendBtn" onclick="sendMessage()">Gửi</button>
    </div>
</div>

<script>
    const API_URL = "/api/chat";
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const memoryText = document.getElementById('memoryText');

    let history = [];
    let currentSummary = ""; // Biến lưu bộ nhớ

    userInput.addEventListener("keypress", (e) => { if(e.key === "Enter") sendMessage() });

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // 1. Hiện tin User
        addMessage(text, 'user');
        userInput.value = '';
        
        try {
            // 2. Gọi API Vercel
            const res = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: text,
                    history: history,
                    currentSummary: currentSummary // Gửi kèm bộ nhớ cũ
                })
            });

            const data = await res.json();
            
            // 3. Hiện tin AI
            const aiText = data.response || "Lỗi.";
            addMessage(aiText, 'ai');

            // 4. CẬP NHẬT BỘ NHỚ MỚI TỪ CLOUDFLARE TRẢ VỀ
            if (data.newSummary) {
                currentSummary = data.newSummary;
                memoryText.innerText = currentSummary; // Update lên màn hình
                // Hiệu ứng nháy màu để biết bộ nhớ vừa update
                memoryText.style.color = "#fff";
                setTimeout(() => memoryText.style.color = "#0f0", 500);
            }

            // Lưu history (chỉ để hiển thị, logic chính nằm ở summary)
            history.push({ role: "user", content: text });
            history.push({ role: "assistant", content: aiText });

        } catch (e) {
            addMessage("Lỗi kết nối: " + e.message, 'ai');
        }
    }

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
